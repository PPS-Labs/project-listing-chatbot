version: '3.8'

services:
  backend:
    build: ./backend
    container_name: robohelper_backend
    volumes:
      - ./backend:/app
    # Strict routing: No host port mapping for backend. 
    # Only accessible via Nginx within the Docker network.
    expose:
      - "8000"
    environment:
      - DEBUG=1
    # Automate migrations and start server
    command: >
      sh -c "python manage.py migrate && 
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    image: nginx:alpine
    container_name: robohelper_frontend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - backend
